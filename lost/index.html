<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>You Are Lost in Space</title>
  <style>
    /* Reset and base styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #000010 0%, #000000 80%);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: #e0e7ff;
      font-family: 'Space Mono', monospace, sans-serif;
    }

    /* Starfield container */
    #stars {
      position: fixed;
      width: 100%;
      height: 100%;
      background: transparent;
      z-index: 0;
      pointer-events: none;
    }

    /* Star styles */
    .star {
      position: absolute;
      width: 1px;
      height: 1px;
      background: transparent;
      animation: twinkle var(--duration, 2s) infinite ease-in-out;
      animation-delay: var(--delay, 0s);
    }

    /* Glare effect with pseudo-elements */
    .star::before, .star::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: var(--glare-size, 20px);
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.7), transparent);
      transform: translate(-50%, -50%) rotate(var(--glare-angle, 0deg));
    }

    .star::after {
      transform: translate(-50%, -50%) rotate(calc(var(--glare-angle, 0deg) + 90deg));
    }

    /* Twinkle animation */
    @keyframes twinkle {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Title styling */
    h1 {
      font-size: 4rem;
      text-align: center;
      text-shadow: 0 0 5px #a0bfff, 0 0 10px #5a7fff, 0 0 20px #2a4fff, 0 0 40px #1030ff;
      letter-spacing: 0.2em;
      margin-bottom: 0.2em;
    }

    /* Subtitle */
    p {
      font-size: 1.5rem;
      color: #aabcee88;
      max-width: 600px;
      text-align: center;
      line-height: 1.5;
      text-shadow: 0 0 10px #2a4fff;
    }

    /* Link styling */
    a {
      color: #7fa2ff;
      text-decoration: none;
      font-weight: bold;
      text-shadow: 0 0 5px #5a7fff;
      transition: color 0.3s ease;
    }

    a:hover {
      color: #e0e7ff;
      text-shadow: 0 0 10px #a0bfff;
    }

    /* Spaceship */
    .spaceship {
      position: relative;
      margin-top: 3em;
      width: 100px;
      height: 120px;
      animation: drift 8s ease-in-out infinite;
      filter: drop-shadow(0 0 10px #6f9eff);
      transform-origin: center bottom;
    }

    @keyframes drift {
      0%, 100% {
        transform: translateX(0) rotate(0deg);
      }
      50% {
        transform: translateX(20px) rotate(5deg);
      }
    }
  </style>
</head>
<body>
  <div id="stars"></div>
  <h1>YOU ARE LOST</h1>
  <br />
    <br />

      <br />

        <br />

  <p>Your quest and search ends here.</p>
  <br />
  <p>This is not where you were meant to be.</p>
  <br />
  <br />  <br />  <br />
  <p><a href="https://sireto.io">Go Home</a></p>
  <div class="spaceship" aria-label="Drifting spaceship" role="img">
    <svg viewBox="0 0 64 80" fill="none" xmlns="http://www.w3.org/2000/svg" width="100" height="120">
      <defs>
        <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
          <stop offset="0%" stop-color="#5A7FFF" stop-opacity="0.7" />
          <stop offset="100%" stop-color="#1020FF" stop-opacity="0" />
        </radialGradient>
      </defs>
      <path d="M32 0L40 30L32 80L24 30L32 0Z" fill="url(#glow)" />
      <path d="M32 10L38 30L32 75L26 30L32 10Z" fill="#7fa2ff" />
      <circle cx="32" cy="15" r="5" fill="#aac8ff" />
      <circle cx="32" cy="15" r="3" fill="#e0e7ff" />
      <rect x="29" y="30" width="6" height="20" fill="#aac8ff" />
    </svg>
  </div>

  <script>
    // Create stars dynamically
    const starsContainer = document.getElementById('stars');
    const sizeScale = 0.5; // Scale factor to make stars 50% smaller

    function randomRange(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createStar(sizeCategory, top, left) {
      const star = document.createElement('div');
      star.classList.add('star');
      let minGlare, maxGlare;
      if (sizeCategory === 'large') {
        minGlare = 20;
        maxGlare = 30;
      } else if (sizeCategory === 'medium') {
        minGlare = 10;
        maxGlare = 15;
      } else if (sizeCategory === 'small') {
        minGlare = 5;
        maxGlare = 10;
      } else if (sizeCategory === 'verysmall') {
        minGlare = 4;
        maxGlare = 5;
      }
      let glareSize = randomRange(minGlare * sizeScale, maxGlare * sizeScale);
      glareSize = Math.max(glareSize, 2);
      star.style.setProperty('--glare-size', glareSize + 'px');
      const angle = randomRange(0, 360);
      star.style.setProperty('--glare-angle', angle + 'deg');
      star.style.setProperty('--duration', randomRange(1.5, 3) + 's');
      star.style.setProperty('--delay', randomRange(0, 2) + 's');
      if (top && left) {
        star.style.top = top;
        star.style.left = left;
      } else {
        star.style.top = randomRange(0, 100) + 'vh';
        star.style.left = randomRange(0, 100) + 'vw';
      }
      return star;
    }

    // Define constellations
    const constellations = [
      {
        name: 'OrionsBelt',
        stars: [
          { top: '30vh', left: '40vw' },
          { top: '30vh', left: '42vw' },
          { top: '30vh', left: '44vw' }
        ]
      },
      {
        name: 'BigDipper',
        stars: [
          { top: '20vh', left: '20vw' },
          { top: '20vh', left: '25vw' },
          { top: '25vh', left: '20vw' },
          { top: '25vh', left: '25vw' },
          { top: '25vh', left: '30vw' },
          { top: '27vh', left: '35vw' },
          { top: '29vh', left: '40vw' }
        ]
      },
      {
        name: 'Cassiopeia',
        stars: [
          { top: '15vh', left: '60vw' },
          { top: '17vh', left: '62vw' },
          { top: '16vh', left: '64vw' },
          { top: '17vh', left: '66vw' },
          { top: '15vh', left: '68vw' }
        ]
      },
      {
        name: 'Scorpio',
        stars: [
          { top: '60vh', left: '50vw' },
          { top: '62vh', left: '52vw' },
          { top: '64vh', left: '54vw' },
          { top: '66vh', left: '56vw' },
          { top: '65vh', left: '58vw' },
          { top: '63vh', left: '60vw' },
          { top: '61vh', left: '62vw' }
        ]
      },
      {
        name: 'UrsaMinor',
        stars: [
          { top: '10vh', left: '30vw' },
          { top: '12vh', left: '32vw' },
          { top: '14vh', left: '34vw' },
          { top: '16vh', left: '36vw' },
          { top: '15vh', left: '33vw' }
        ]
      }
    ];

    // Add constellation stars
    constellations.forEach(constellation => {
      constellation.stars.forEach(pos => {
        const star = createStar('large', pos.top, pos.left);
        starsContainer.appendChild(star);
      });
    });

    // Create background stars
    const totalBackgroundStars = 600;
    const largeStars = Math.floor(totalBackgroundStars * 0.01);
    const mediumStars = Math.floor(totalBackgroundStars * 0.04);
    const smallStars = Math.floor(totalBackgroundStars * 0.15);
    const verySmallStars = totalBackgroundStars - largeStars - mediumStars - smallStars;

    for (let i = 0; i < largeStars; i++) {
      starsContainer.appendChild(createStar('large'));
    }
    for (let i = 0; i < mediumStars; i++) {
      starsContainer.appendChild(createStar('medium'));
    }
    for (let i = 0; i < smallStars; i++) {
      starsContainer.appendChild(createStar('small'));
    }
    for (let i = 0; i < verySmallStars; i++) {
      starsContainer.appendChild(createStar('verysmall'));
    }
  </script>
</body>
</html>
